######################################################################
## This file contains the default application configurations
######################################################################
########################################
## Spring Application Config
########################################
application.name=@project.name@
application.version=@project.version@
application.release.date=@maven.build.timestamp@
application.config.name=DEFAULT
spring.application.name=@project.name@
########################################
## Spring Basic Config
########################################
spring.main.banner-mode=off
server.shutdown=graceful
# spring.mandatory-file-encoding=UTF-8
server.servlet.session.timeout=30m
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

########################################
## reCAPTCHA Configuration
########################################
# reCAPTCHA site key (for frontend)
recaptcha.site.key=${RECAPTCHA_SITE_KEY:}
# reCAPTCHA secret key (for backend verification)
recaptcha.secret.key=${RECAPTCHA_SECRET_KEY:}
